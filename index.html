<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영화 인맥 관리 – FilmNet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1120;
      --surface: #141e30;
      --surface2: #1c2840;
      --surface3: #243250;
      --border: #2a3a54;
      --border2: #344766;
      --text: #e8f0fe;
      --text-muted: #8da3c4;
      --text-dim: #4f6a8a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-glow: rgba(59,130,246,0.25);
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --purple: #8b5cf6;
      --orange: #f97316;
      --cyan: #06b6d4;
      --pink: #ec4899;
      --lime: #84cc16;
    }

    html { height: 100%; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ═══ SCROLLBAR ═══ */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ═══ HEADER ═══ */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      padding: 0 16px;
      gap: 10px;
      position: relative;
      z-index: 100;
      min-height: 56px;
      flex-shrink: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(59,130,246,0.4);
    }

    .app-name {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .app-name span { color: var(--text-muted); font-weight: 400; }

    .nav-tabs {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
      flex-shrink: 0;
    }

    .nav-tab {
      padding: 6px 16px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { background: var(--accent); color: #fff; }

    .header-search {
      flex: 1;
      min-width: 120px;
      max-width: 360px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 13px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 12px 8px 32px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: auto;
    }

    /* ═══ BUTTONS ═══ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #fff;
    }

    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .btn-danger { border-color: rgba(239,68,68,0.4); color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: var(--red); }

    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      line-height: 1;
    }

    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.del:hover { border-color: var(--red); color: var(--red); }

    /* ═══ MAIN LAYOUT ═══ */
    .main {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .view {
      display: none;
      height: 100%;
    }

    .view.active {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    /* ═══ CONTACTS VIEW ═══ */
    #view-contacts {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 20px 16px;
    }

    .contacts-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .contacts-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .filter-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .filter-select:focus { border-color: var(--accent); }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
      gap: 14px;
    }

    /* ═══ CONTACT CARD ═══ */
    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .contact-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
      background: var(--card-color, var(--accent));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .contact-card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }

    .contact-card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(0,0,0,0.3);
    }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-pos {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .card-co {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .contact-card:hover .card-actions { opacity: 1; }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-films {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-univ {
      font-size: 11px;
      color: var(--text-dim);
      max-width: 130px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ═══ EMPTY STATE ═══ */
    .empty {
      text-align: center;
      padding: 80px 24px;
      grid-column: 1 / -1;
    }

    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }

    /* ═══ GRAPH VIEW ═══ */
    #view-graph { flex-direction: row; }

    .graph-canvas {
      flex: 1;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    #graph-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .graph-controls {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ctrl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 190px;
    }

    .ctrl-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .toggle-row:last-child { margin-bottom: 0; }

    .toggle-label {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .edge-line {
      width: 20px;
      height: 2px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    .edge-line.dashed {
      background: none;
      border-top: 2px dashed var(--yellow);
    }

    /* Toggle switch */
    .tog {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 18px;
      flex-shrink: 0;
    }

    .tog input { display: none; }

    .tog-track {
      position: absolute;
      inset: 0;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .tog input:checked + .tog-track {
      background: var(--accent);
      border-color: var(--accent);
    }

    .tog-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: transform 0.2s, background 0.2s;
      pointer-events: none;
    }

    .tog input:checked ~ .tog-thumb {
      transform: translateX(16px);
      background: #fff;
    }

    /* Legend */
    .legend { display: flex; flex-direction: column; gap: 5px; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Graph stat */
    .graph-stat {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .graph-stat span { color: var(--text); font-weight: 600; }

    /* Graph tooltip */
    .g-tip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      z-index: 400;
      opacity: 0;
      transition: opacity 0.12s;
      max-width: 220px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .g-tip.show { opacity: 1; }
    .g-tip-name { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
    .g-tip-sub { color: var(--text-muted); line-height: 1.4; }

    /* ═══ GRAPH SIDE PANEL ═══ */
    .graph-panel {
      width: 0;
      min-width: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow: hidden;
      transition: width 0.28s ease;
      flex-shrink: 0;
    }

    .graph-panel.open { width: 310px; }

    .panel-scroll {
      width: 310px;
      height: 100%;
      overflow-y: auto;
      padding: 20px;
    }

    .panel-close-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .panel-header-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .panel-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 12px;
    }

    .panel-name {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }

    .panel-sub {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 18px;
    }

    .panel-meta-row {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .panel-meta-icon { color: var(--text-dim); flex-shrink: 0; width: 14px; }

    .sec-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section { margin-bottom: 20px; }

    .p-film-item {
      background: var(--surface2);
      border-radius: 7px;
      padding: 9px 11px;
      margin-bottom: 7px;
    }

    .p-film-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .p-film-meta { font-size: 11px; color: var(--text-muted); }

    .p-conn-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .p-conn-item:last-child { border-bottom: none; }
    .p-conn-item:hover .p-conn-name { color: var(--accent); }

    .p-conn-av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .p-conn-info { flex: 1; min-width: 0; }
    .p-conn-name { font-size: 13px; font-weight: 600; }
    .p-conn-pos { font-size: 11px; color: var(--text-muted); }

    .badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-film { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-univ { background: rgba(245,158,11,0.15); color: var(--yellow); }

    /* ═══ MODALS ═══ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 560px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      transform: translateY(16px) scale(0.98);
      transition: transform 0.2s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-lg { width: 660px; }

    .mh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .mh-title { font-size: 16px; font-weight: 700; }

    .m-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      transition: all 0.15s;
    }

    .m-close:hover { background: var(--surface2); color: var(--text); }

    .mbody {
      overflow-y: auto;
      flex: 1;
      padding: 20px 22px;
    }

    .mfoot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .mfoot-right { margin-left: auto; display: flex; gap: 8px; }

    /* Form tabs */
    .form-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 18px;
    }

    .form-tab {
      padding: 8px 16px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }

    .form-tab:hover { color: var(--text); }
    .form-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Form fields */
    .fg { margin-bottom: 14px; }

    .fg-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .fg label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .fi, .fs, .fta {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 9px 11px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .fi:focus, .fs:focus, .fta:focus { border-color: var(--accent); }

    .fta { resize: vertical; min-height: 76px; }

    /* Film rows */
    .film-rows { display: flex; flex-direction: column; gap: 9px; margin-bottom: 10px; }

    .film-row {
      display: grid;
      grid-template-columns: 1fr 72px 1fr 28px;
      gap: 7px;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px;
    }

    .film-row .fi {
      background: var(--surface3);
      padding: 7px 9px;
    }

    .film-row-del {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.08);
      color: var(--red);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .film-row-del:hover { background: rgba(239,68,68,0.18); }

    .films-empty {
      text-align: center;
      padding: 20px;
      color: var(--text-dim);
      font-size: 13px;
      background: var(--surface2);
      border: 1px dashed var(--border2);
      border-radius: 9px;
      margin-bottom: 10px;
    }

    /* ═══ DETAIL MODAL ═══ */
    .detail-hero {
      display: flex;
      align-items: center;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 18px;
    }

    .detail-av {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .detail-name { font-size: 21px; font-weight: 700; margin-bottom: 3px; }
    .detail-pos { font-size: 13px; color: var(--text-muted); margin-bottom: 2px; }
    .detail-co { font-size: 12px; color: var(--text-dim); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .dg-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
    .dg-value { font-size: 13px; }

    .sec-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .filmography { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }

    .film-entry {
      display: flex;
      align-items: center;
      gap: 11px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 9px 12px;
    }

    .film-yr {
      font-size: 11px;
      color: var(--text-dim);
      width: 34px;
      flex-shrink: 0;
    }

    .film-ttl { flex: 1; font-size: 13px; font-weight: 600; }

    .film-role {
      font-size: 11px;
      padding: 2px 8px;
      background: rgba(59,130,246,0.12);
      color: #60a5fa;
      border-radius: 20px;
    }

    .conns-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .conn-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .conn-card:hover { border-color: var(--accent); }

    .conn-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .cc-av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .cc-name { font-size: 13px; font-weight: 600; }

    .cc-badges { display: flex; flex-wrap: wrap; gap: 4px; }

    /* ═══ TOAST ═══ */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      z-index: 999;
      transform: translateY(12px);
      opacity: 0;
      transition: all 0.25s;
      max-width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.ok { border-color: var(--green); color: var(--green); }
    .toast.err { border-color: var(--red); color: var(--red); }

    /* ═══ D3 GRAPH STYLES ═══ */
    .node { cursor: pointer; }

    .node-label {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      fill: #94a3b8;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.8);
    }

    .node-initials {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      fill: #fff;
      pointer-events: none;
    }

    .link-line {
      transition: stroke-opacity 0.2s;
    }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 700px) {
      .app-name { display: none; }
      .contact-grid { grid-template-columns: 1fr; }
      .fg-row { grid-template-columns: 1fr; }

  }
}

function saveData() {
  localStorage.setItem('filmnet_v2', JSON.stringify(contacts));
}

function computeEdges() {
  const edges = [];
  const n = contacts.length;

  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const a = contacts[i], b = contacts[j];

      // Film connections
      const aTitles = (a.films || []).map(f => f.title.trim().toLowerCase());
      const bTitles = (b.films || []).map(f => f.title.trim().toLowerCase());
      for (const t of aTitles) {
        if (bTitles.includes(t)) {
          const fa = (a.films || []).find(f => f.title.trim().toLowerCase() === t);
          const fb = (b.films || []).find(f => f.title.trim().toLowerCase() === t);
          edges.push({ source: a.id, target: b.id, type: 'film',
            film: fa?.title || t, year: fa?.year, roleA: fa?.role, roleB: fb?.role });
        }
      }

      // University connections
      const ua = (a.university || '').trim();
      const ub = (b.university || '').trim();
      if (ua && ub && ua === ub) {
        edges.push({ source: a.id, target: b.id, type: 'university', university: ua });
      }
    }
  }

  return edges;
}

// ════════════════════════════════════════════════════════

function onEdgeToggle() {
  gShowFilm = document.getElementById('togFilm').checked;
  gShowUniv = document.getElementById('togUniv').checked;
  initOrUpdateGraph();
}

function initOrUpdateGraph() {
  const svgEl = document.getElementById('graph-svg');
  const W = svgEl.clientWidth || 900;
  const H = svgEl.clientHeight || 600;

  // Build data
  const allEdges = computeEdges();
  const filmEdges = allEdges.filter(e => e.type === 'film');
  const univEdges = allEdges.filter(e => e.type === 'university');

  // Update stats
  document.getElementById('gStatNodes').textContent = contacts.length;
  document.getElementById('gStatFilm').textContent = filmEdges.length;
  document.getElementById('gStatUniv').textContent = univEdges.length;

  // Active edges
  let activeEdges = [];
  if (gShowFilm) {
    // Deduplicate film edges by pair (keep first occurrence per pair)
    const seen = new Set();
    for (const e of filmEdges) {
      const key = [e.source, e.target].sort().join('|');
      if (!seen.has(key)) { seen.add(key); activeEdges.push(e); }
    }
  }
  if (gShowUniv) activeEdges = activeEdges.concat(univEdges);

  const nodes = contacts.map(ct => ({ ...ct }));

  if (gSimulation) gSimulation.stop();

  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  gSvg = svg;

  gZoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => {
    gGroup.attr('transform', e.transform);
  });
  svg.call(gZoom);
  svg.on('click', () => deselect());

  gGroup = svg.append('g');

  // Defs: gradients for film edges
  const defs = svg.append('defs');
  defs.append('filter').attr('id', 'glow')
    .append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');

  // Links
  const linkG = gGroup.append('g').attr('class', 'link-layer');
  gLinkSel = linkG.selectAll('line')
    .data(activeEdges)
    .join('line')
    .attr('class', 'link-line')
    .attr('stroke', e => e.type === 'film' ? '#3b82f6' : '#f59e0b')
    .attr('stroke-width', e => e.type === 'film' ? 2 : 1.5)
    .attr('stroke-opacity', 0.5)
    .attr('stroke-dasharray', e => e.type === 'university' ? '6,4' : null)
    .on('mouseenter', function(event, d) {
      d3.select(this).attr('stroke-opacity', 1);
      showTip(event,
        d.type === 'film'
          ? `🎞 ${d.film} (${d.year || ''})`
          : `🎓 ${d.university} 동문`,
        getContactName(d.source) + ' ↔ ' + getContactName(d.target));
    })
    .on('mouseleave', function() {
      d3.select(this).attr('stroke-opacity', gSelectedId ? 0.15 : 0.5);
      hideTip();
    });

  // Node groups
  const nodeG = gGroup.append('g').attr('class', 'node-layer');
  gNodeSel = nodeG.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (ev, d) => {
        if (!ev.active) gSimulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end', (ev, d) => {
        if (!ev.active) gSimulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      }))
    .on('click', (ev, d) => {
      ev.stopPropagation();
      if (gSelectedId === d.id) deselect();
      else selectNode(d.id);
    })
    .on('mouseenter', (ev, d) => {
      showTip(ev, d.name, [d.position, d.company].filter(Boolean).join(' · '));
    })
    .on('mouseleave', () => hideTip());

  // Outer glow ring
  gNodeSel.append('circle')
    .attr('r', 28)
    .attr('fill', 'none')
    .attr('stroke', d => c(d.position))
    .attr('stroke-width', 8)
    .attr('stroke-opacity', 0.12)
    .attr('class', 'glow-ring');

  // Main circle
  gNodeSel.append('circle')
    .attr('r', 21)
    .attr('fill', d => c(d.position))
    .attr('fill-opacity', 0.9)
    .attr('stroke', d => c(d.position))
    .attr('stroke-width', 2.5)
    .attr('stroke-opacity', 0.6);

  // Initials
  gNodeSel.append('text')
    .attr('class', 'node-initials')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'central')
    .text(d => ini(d.name));

  // Name label
  gNodeSel.append('text')
    .attr('class', 'node-label')
    .attr('text-anchor', 'middle')
    .attr('dy', 35)
    .text(d => d.name);

  // Simulation
  gSimulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(activeEdges).id(d => d.id).distance(d => d.type === 'film' ? 130 : 160).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-380))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(50))
    .on('tick', () => {
      gLinkSel
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      gNodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // Restore selection
  if (gSelectedId && contacts.find(x => x.id === gSelectedId)) {
    selectNode(gSelectedId);
  }

  graphReady = true;
  buildLegend();
}

function getContactName(idOrObj) {
  const id = typeof idOrObj === 'object' ? idOrObj.id : idOrObj;
  return contacts.find(x => x.id === id)?.name || '';
}

function selectNode(id) {
  gSelectedId = id;
  if (!gLinkSel || !gNodeSel) return;

  // Find connected nodes
  const connectedIds = new Set([id]);
  gLinkSel.each(function(d) {
    const src = typeof d.source === 'object' ? d.source.id : d.source;
    const tgt = typeof d.target === 'object' ? d.target.id : d.target;
    if (src === id) connectedIds.add(tgt);
    if (tgt === id) connectedIds.add(src);
  });

  // Dim non-connected
  gNodeSel
    .classed('dimmed', d => !connectedIds.has(d.id))
    .select('circle:nth-child(2)')
    .attr('stroke-width', d => d.id === id ? 4 : 2.5)
    .attr('stroke-opacity', d => d.id === id ? 1 : 0.6);

  gNodeSel.select('.glow-ring')
    .attr('stroke-opacity', d => d.id === id ? 0.45 : (connectedIds.has(d.id) ? 0.12 : 0.04));

  gLinkSel
    .attr('stroke-opacity', function(d) {
      const src = typeof d.source === 'object' ? d.source.id : d.source;
      const tgt = typeof d.target === 'object' ? d.target.id : d.target;
      return (src === id || tgt === id) ? 0.9 : 0.06;
    });

  renderPanel(id);
}

function deselect() {
  gSelectedId = null;
  if (!gLinkSel || !gNodeSel) return;

  gNodeSel.classed('dimmed', false);
  gNodeSel.select('circle:nth-child(2)').attr('stroke-width', 2.5).attr('stroke-opacity', 0.6);
  gNodeSel.select('.glow-ring').attr('stroke-opacity', 0.12);
  gLinkSel.attr('stroke-opacity', 0.5);

  document.getElementById('graphPanel').classList.remove('open');
}

function renderPanel(id) {
  const ct = contacts.find(x => x.id === id);
  if (!ct) return;

  const col = c(ct.position);
  const edges = computeEdges();
  const myEdges = edges.filter(e => e.source === id || e.target === id);

  const connMap = {};
  for (const e of myEdges) {
    const oid = e.source === id ? e.target : e.source;
    if (!connMap[oid]) connMap[oid] = { films: [], univs: [] };
    if (e.type === 'film') connMap[oid].films.push(e.film);
    else connMap[oid].univs.push(e.university);
  }
  const connList = Object.entries(connMap)
    .map(([cid, info]) => ({ ct: contacts.find(x => x.id === cid), info }))
    .filter(x => x.ct);

  const films = (ct.films || []).slice().sort((a, b) => (b.year || 0) - (a.year || 0));

  let html = `
    <div class="panel-close-row">
      <div class="panel-header-title">연락처 정보</div>
      <button class="icon-btn" onclick="deselect()" style="font-size:14px">✕</button>
    </div>

    <div class="panel-avatar" style="background:${col}">${ini(ct.name)}</div>
    <div class="panel-name">${ct.name}</div>
    <div class="panel-sub">${[ct.position, ct.company].filter(Boolean).join(' · ')}</div>

    <div class="panel-section">
      ${ct.email ? `<div class="panel-meta-row"><span class="panel-meta-icon">✉</span>${ct.email}</div>` : ''}
      ${ct.phone ? `<div class="panel-meta-row"><span class="panel-meta-icon">📞</span>${ct.phone}</div>` : ''}
      ${ct.university ? `<div class="panel-meta-row"><span class="panel-meta-icon">🎓</span>${ct.university}</div>` : ''}
    </div>`;

  if (films.length) {
    html += `
      <div class="panel-section">
        <div class="sec-title">필모그래피 (${films.length}편)</div>
        ${films.slice(0, 5).map(f => `
          <div class="p-film-item">
            <div class="p-film-title">${f.title}</div>
            <div class="p-film-meta">${f.year || '–'} · ${f.role}</div>
          </div>`).join('')}
        ${films.length > 5 ? `<div style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:4px">외 ${films.length - 5}편</div>` : ''}
      </div>`;
  }

  if (connList.length) {
    html += `
      <div class="panel-section">
        <div class="sec-title">연결된 인맥 (${connList.length}명)</div>
        ${connList.map(({ ct: other, info }) => `
          <div class="p-conn-item" onclick="selectNode('${other.id}')">
            <div class="p-conn-av" style="background:${c(other.position)}">${ini(other.name)}</div>
            <div class="p-conn-info">
              <div class="p-conn-name">${other.name}</div>
              <div class="p-conn-pos">${other.position || ''}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">
              ${info.films.length ? `<span class="badge badge-film">영화</span>` : ''}
              ${info.univs.length ? `<span class="badge badge-univ">동문</span>` : ''}
            </div>
          </div>`).join('')}
      </div>`;
  }

  html += `
    <div style="margin-top:8px">
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="openDetail('${id}')">
        상세 정보 보기
      </button>
    </div>`;

  document.getElementById('panelScroll').innerHTML = html;
  document.getElementById('graphPanel').classList.add('open');
}

function resetZoom() {
  if (!gSvg || !gZoom) return;
  gSvg.transition().duration(500).call(gZoom.transform, d3.zoomIdentity);
}

function buildLegend() {
  document.getElementById('graphLegend').innerHTML =
    Object.entries(POS_COLORS).map(([pos, col]) => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${col}"></div>
        ${pos}
      </div>`).join('');
}

function showTip(event, name, detail) {
  const tip = document.getElementById('gTip');
  document.getElementById('gTipName').textContent = name;
  document.getElementById('gTipSub').textContent = detail || '';
  tip.style.left = (event.clientX + 14) + 'px';
  tip.style.top = (event.clientY - 14) + 'px';
  tip.classList.add('show');
}

function hideTip() {
  document.getElementById('gTip').classList.remove('show');
}

// Resize handler
window.addEventListener('resize', () => {
  if (currentView === 'graph' && graphReady) initOrUpdateGraph();
});

// ════════════════════════════════════════════════════════
//  UTIL
// ════════════════════════════════════════════════════════

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════

loadData();
renderContacts();
</script>
</body>
</html>
